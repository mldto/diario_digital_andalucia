<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-5 shadow-sm border-top border-dark border-4" style="max-width: 800px;">
        <h2 class="fw-bold mb-4">PERSONAL DE REDACCIÓN</h2>
        {% with msgs = get_flashed_messages() %}{% for m in msgs %}<div class="alert alert-success">{{ m }}</div>{% endfor %}{% endwith %}
        <form method="POST" class="row g-3 mb-5 border p-3">
            <div class="col-md-6"><label class="small fw-bold">NOMBRE COMPLETO</label><input type="text" name="nombre" class="form-control" required></div>
            <div class="col-md-6"><label class="small fw-bold">CONTRASEÑA</label><input type="password" name="pw" class="form-control" required></div>
            <div class="col-md-6"><label class="small fw-bold">PROVINCIA</label>
                <select name="prov" class="form-select">
                    <option>Sevilla</option><option>Málaga</option><option>Granada</option><option>Córdoba</option>
                    <option>Cádiz</option><option>Almería</option><option>Huelva</option><option>Jaén</option>
                </select>
            </div>
            <div class="col-md-6"><label class="small fw-bold">ROL</label><select name="role" class="form-select"><option value="redactor">Redactor</option><option value="admin">Director</option></select></div>
            <button class="btn btn-dark w-100 fw-bold">GENERAR ACCESO ÚNICO</button>
        </form>
        <table class="table table-hover">
            <thead><tr><th>ID LOGIN</th><th>NOMBRE</th><th>PROVINCIA</th></tr></thead>
            <tbody>{% for u in usuarios %}<tr><td class="fw-bold">{{ u.user_id_login }}</td><td>{{ u.nombre_prensa }}</td><td>{{ u.provincia }}</td></tr>{% endfor %}</tbody>
        </table>
        <a href="/" class="btn btn-link">Volver</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light p-5">
    <div class="container bg-white p-5 border-top border-primary border-4 shadow-sm" style="max-width:500px">
        <h4 class="fw-bold mb-4">GESTIÓN DE SECCIONES</h4>
        <form method="POST" class="mb-4">
            <div class="input-group">
                <input type="text" name="nombre" class="form-control rounded-0" placeholder="Ej: ECONOMÍA" required>
                <button class="btn btn-primary rounded-0">AÑADIR</button>
            </div>
        </form>
        <ul class="list-group rounded-0">
            {% for c in categorias %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    {{ c.nombre }}
                </li>
            {% endfor %}
        </ul>
        <hr>
        <a href="/" class="btn btn-link text-dark p-0">Volver a portada</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card p-4 shadow-sm">
            <h4 class="fw-bold mb-4">SECCIONES DEL DIARIO</h4>
            <form method="POST" class="d-flex gap-2 mb-4">
                <input type="text" name="nombre" class="form-control" placeholder="Nombre de sección (Ej: ECONOMÍA)" required>
                <button type="submit" class="btn btn-dark">AÑADIR</button>
            </form>

            <ul class="list-group list-group-flush">
                {% for c in categorias %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    {{ c.nombre }}
                    <a href="{{ url_for('borrar_categoria', id=c.id) }}" class="btn btn-sm btn-outline-danger">Eliminar</a>
                </li>
                {% endfor %}
            </ul>
        </div>
        <a href="/" class="d-block mt-3 text-center text-muted">Volver</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5 bg-light">
    <div class="container bg-white p-5 border-top border-dark border-4 shadow" style="max-width: 500px;">
        <h4 class="fw-bold mb-4">GESTIÓN DE SECCIONES</h4>
        <form method="POST" class="d-flex gap-2 mb-4">
            <input type="text" name="nombre" class="form-control rounded-0" placeholder="Ej: ECONOMÍA" required>
            <button type="submit" class="btn btn-dark rounded-0 fw-bold">AÑADIR</button>
        </form>
        <ul class="list-group list-group-flush">
            {% for cat in categorias %}<li class="list-group-item d-flex justify-content-between"><strong>{{ cat.nombre | upper }}</strong></li>{% endfor %}
        </ul>
        <a href="/" class="btn btn-link text-dark mt-3">← VOLVER</a>
    </div>
</body>
</html>

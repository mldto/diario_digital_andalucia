<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ post.titulo }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Georgia', serif; line-height: 1.8; color: #1a1a1a; }
        .article-body { max-width: 720px; margin: 60px auto; padding: 0 20px; }
        .post-title { font-size: 3.5rem; font-weight: 900; line-height: 1; margin-bottom: 20px; }
        .meta { font-family: sans-serif; font-size: 0.8rem; font-weight: bold; border-top: 1px solid #000; border-bottom: 1px solid #000; padding: 12px 0; margin: 30px 0; text-transform: uppercase; }
        .content h2, .content h3 { font-family: sans-serif; font-weight: 900; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container article-body">
        <a href="/" class="text-dark fw-bold text-decoration-none small">← VOLVER AL DIARIO</a>
        <h1 class="post-title mt-4">{{ post.titulo }}</h1>
        <p class="lead fw-bold" style="color: #444;">{{ post.entradilla }}</p>
        
        {% if post.imagen_url %}
            <figure class="my-4">
                <img src="{{ post.imagen_url }}" class="img-fluid w-100">
                <figcaption class="text-muted small mt-2">{{ post.pie_foto }}</figcaption>
            </figure>
        {% endif %}

        <div class="meta d-flex justify-content-between">
            <span>POR {{ post.autor }} ({{ post.provincia }})</span>
            <span>{{ post.fecha }}</span>
        </div>

        <div class="content fs-5">{{ post.contenido | safe }}</div>
    </div>
</body>
</html>

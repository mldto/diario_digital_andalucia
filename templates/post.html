<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ noticia.titulo }} - El Diario de Andalucía</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Lora:wght@400;700&display=swap');
        .article-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 900; line-height: 1; }
        .article-lead { font-family: 'Lora', serif; font-size: 1.5rem; color: #555; font-style: italic; margin: 30px 0; }
        .article-content { font-family: 'Lora', serif; font-size: 1.25rem; line-height: 1.8; }
        img.main-img { width: 100%; height: auto; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container mt-5" style="max-width: 800px;">
        <p class="text-primary fw-bold text-uppercase">{{ noticia.categoria }}</p>
        <h1 class="article-title">{{ noticia.titulo }}</h1>
        <p class="article-lead">{{ noticia.entradilla }}</p>
        <hr>
        <p class="small">Por <b>{{ noticia.autor }}</b> | {{ noticia.provincia }} | {{ noticia.fecha }}</p>

        {% if noticia.imagen_url %}
        <img src="{{ noticia.imagen_url }}" class="main-img">
        <p class="text-muted small">{{ noticia.pie_foto }}</p>
        {% endif %}

        <div class="article-content">
            {{ noticia.contenido | safe }}
        </div>
        
        <a href="/" class="btn btn-outline-dark mt-5 mb-5">Volver a la portada</a>
    </div>
</body>
</html>

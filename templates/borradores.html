<!DOCTYPE html>
<html>
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light p-5">
    <div class="container bg-white p-5 border-top border-warning border-4 shadow">
        <h3 class="fw-bold mb-4">BORRADORES SIN PUBLICAR</h3>
        <table class="table">
            <thead><tr><th>Fecha</th><th>Titular</th><th>Acción</th></tr></thead>
            <tbody>
                {% for b in borradores %}
                <tr><td>{{b.fecha}}</td><td class="fw-bold">{{b.titulo}}</td>
                <td><a href="/post/{{b.id}}" class="btn btn-sm btn-outline-dark rounded-0">Editar / Ver</a></td></tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/" class="btn btn-link text-dark">Volver</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.ckeditor.com/ckeditor5/40.0.0/classic/ckeditor.js"></script>
    <style>.ck-editor__editable { min-height: 350px; }</style>
</head>
<body class="bg-light p-4">
    <div class="container bg-white p-5 shadow border-top border-dark border-4" style="max-width:900px">
        <h2 class="fw-bold mb-4">MESA DE REDACCIÓN</h2>
        <form method="POST" enctype="multipart/form-data">
            <input type="text" name="titulo" class="form-control form-control-lg mb-3 rounded-0" placeholder="Titular de la noticia..." required>
            <textarea name="entradilla" class="form-control mb-3 rounded-0" placeholder="Entradilla o resumen..."></textarea>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="small fw-bold">SECCIÓN</label>
                    <select name="cat" class="form-select rounded-0" required>
                        {% if not categorias %}
                            <option value="">DEBES CREAR UNA SECCIÓN PRIMERO</option>
                        {% endif %}
                        {% for c in categorias %}
                            <option value="{{c.nombre}}">{{c.nombre}}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="small fw-bold">IMAGEN DESTACADA (JPG/PNG)</label>
                    <input type="file" name="imagen_file" class="form-control rounded-0">
                </div>
            </div>
            
            <input type="text" name="pie" class="form-control mb-3 rounded-0" placeholder="Pie de foto / Autor de la imagen">
            
            <textarea name="contenido" id="editor"></textarea>
            
            <div class="row g-2 mt-4">
                <div class="col-md-8">
                    <button type="submit" name="accion" value="publicar" class="btn btn-dark w-100 py-3 fw-bold rounded-0" {% if not categorias %}disabled{% endif %}>
                        PUBLICAR EN PORTADA
                    </button>
                </div>
                <div class="col-md-4">
                    <button type="submit" name="accion" value="borrador" class="btn btn-outline-secondary w-100 py-3 fw-bold rounded-0">
                        GUARDAR BORRADOR
                    </button>
                </div>
            </div>
        </form>
    </div>
    <script>ClassicEditor.create(document.querySelector('#editor'));</script>
</body>
</html>
